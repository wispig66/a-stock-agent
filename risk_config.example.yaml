# 风控配置 · 复制为 risk_config.yaml 后填实际数值
# total_capital: 现金 + 持仓市值的总资金基准，单位元
total_capital: 500000

# 总仓位红线（占总资金 %），超过即 L1 卡片顶部出 ⚠️ 横幅
max_total_exposure_pct: 70

# 单只首仓硬上限（占总资金 %）
max_single_position_pct: 30

# 连亏心态提醒（Week 2-3 C）
loss_day_threshold_pct: -2.0       # 单日浮亏 < 该值算一天亏
loss_streak_warn_threshold: 2      # 连亏 ≥ 该值出 🧊 心态提醒
