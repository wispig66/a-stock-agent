# 一级题材白名单（首版 50，基于近 2 周 ths_hot_reason 高频统计 + 短线主流题材）
#
# 用途：theme_emergence_loop 把异动事件映射到一级题材，避免"一票挂10概念"的标签洪水。
# 优先级：keywords 命中即归入；members 名单优先于关键词；都不命中走 fallback 概念查询。
#
# 维护：每周末 review 一次（看上周新涌现题材），增删 keywords + members。
# 关键词列表非穷举，命中任一即归入；越具体越优先（"HBM" 优先于 "存储"）。
#
# 排除项（不入白名单，不算"题材"）：央企/国企改革/地方国资/次新股/业绩高增/业绩扭亏/ST博弈/重整/定增 等"属性标签"

