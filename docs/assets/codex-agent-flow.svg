<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">A Stock Agent workflow</title>
  <desc id="desc">Codex automation triggers stock skills, fact packs, card validation, and IM delivery.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3a5068"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f2537" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="560" fill="#f6f8fb"/>
  <text x="72" y="68" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#14263a">Codex Agent 工作流</text>
  <text x="72" y="101" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" fill="#63758a">短时 LLM 任务由 Codex automations 触发；长时监听由本地 daemon 承担。</text>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif">
    <rect x="72" y="156" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="96" y="195" font-size="19" font-weight="700" fill="#19324a">Codex automation</text>
    <text x="96" y="225" font-size="15" fill="#65778a">08:00 / 09:30 / 15:35</text>

    <line x1="272" y1="209" x2="340" y2="209" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="350" y="156" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="374" y="195" font-size="19" font-weight="700" fill="#19324a">stock-* skill</text>
    <text x="374" y="225" font-size="15" fill="#65778a">premarket / intraday / weekly</text>

    <line x1="550" y1="209" x2="618" y2="209" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="628" y="156" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="652" y="195" font-size="19" font-weight="700" fill="#19324a">fact pack</text>
    <text x="652" y="225" font-size="15" fill="#65778a">行情 / 题材 / 消息 / 持仓</text>

    <line x1="828" y1="209" x2="896" y2="209" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="906" y="156" width="154" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="930" y="195" font-size="19" font-weight="700" fill="#19324a">研究卡片</text>
    <text x="930" y="225" font-size="15" fill="#65778a">Codex / LLM</text>

    <rect x="350" y="340" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="374" y="379" font-size="19" font-weight="700" fill="#19324a">card validator</text>
    <text x="374" y="409" font-size="15" fill="#65778a">ALLOWED facts 校验</text>

    <line x1="983" y1="270" x2="983" y2="318" stroke="#3a5068" stroke-width="2.4"/>
    <line x1="983" y1="318" x2="550" y2="393" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <line x1="350" y1="393" x2="282" y2="393" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="72" y="340" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="96" y="379" font-size="19" font-weight="700" fill="#19324a">IM gateway</text>
    <text x="96" y="409" font-size="15" fill="#65778a">Telegram / 飞书</text>

    <rect x="628" y="340" width="190" height="106" rx="14" fill="#ffffff" stroke="#d7e0ea" filter="url(#shadow)"/>
    <text x="652" y="379" font-size="19" font-weight="700" fill="#19324a">SQLite 审计</text>
    <text x="652" y="409" font-size="15" fill="#65778a">inbound / outbound / decisions</text>

    <line x1="550" y1="393" x2="618" y2="393" stroke="#3a5068" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="906" y="340" width="154" height="106" rx="14" fill="#eaf6ef" stroke="#b7dfc3" filter="url(#shadow)"/>
    <text x="930" y="379" font-size="19" font-weight="700" fill="#1f6b3c">daemon</text>
    <text x="930" y="409" font-size="15" fill="#587165">watch / anomaly / theme</text>
  </g>
</svg>
