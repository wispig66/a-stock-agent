<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Telegram research card demo</title>
  <desc id="desc">A sanitized Telegram-style A-share research card generated by A Stock Agent.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#e8eef6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#15324d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1120" height="720" fill="url(#page)"/>
  <rect x="142" y="60" width="836" height="600" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="142" y="60" width="836" height="72" rx="22" fill="#2a7bd8"/>
  <rect x="142" y="110" width="836" height="22" fill="#2a7bd8"/>
  <circle cx="190" cy="96" r="18" fill="#ffffff" opacity="0.96"/>
  <text x="222" y="103" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#ffffff">A Stock Agent</text>
  <text x="818" y="101" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="16" fill="#dcecff">Telegram demo</text>

  <text x="190" y="178" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700" fill="#132438">盘前研究卡 · 示例数据</text>
  <text x="190" y="211" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="16" fill="#6b7c8f">由 Codex skill 生成，关键数据来自 fact pack。示例仅展示格式，不构成投资建议。</text>

  <rect x="190" y="244" width="740" height="76" rx="12" fill="#f6f9fd" stroke="#d9e4ef"/>
  <text x="214" y="276" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#1d3147">今日结论</text>
  <text x="214" y="303" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" fill="#24384d">主攻 1 条，潜伏 2 条；未触发买点则空仓等待。</text>

  <rect x="190" y="344" width="230" height="132" rx="12" fill="#fff7ed" stroke="#f4c48a"/>
  <text x="214" y="376" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#9a4d00">主攻</text>
  <text x="214" y="406" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" fill="#24384d">600000 示例股份</text>
  <text x="214" y="436" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">触发：放量突破前高</text>
  <text x="214" y="462" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">止损：跌破 5 日线</text>

  <rect x="445" y="344" width="230" height="132" rx="12" fill="#eefbf4" stroke="#a9dec0"/>
  <text x="469" y="376" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#207348">潜伏</text>
  <text x="469" y="406" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" fill="#24384d">300000 示例科技</text>
  <text x="469" y="436" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">题材：低空经济</text>
  <text x="469" y="462" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">条件：缩量回踩</text>

  <rect x="700" y="344" width="230" height="132" rx="12" fill="#f1f5f9" stroke="#cbd7e5"/>
  <text x="724" y="376" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#42526b">禁买</text>
  <text x="724" y="406" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" fill="#24384d">高位一致加速</text>
  <text x="724" y="436" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">原因：炸板率升高</text>
  <text x="724" y="462" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#6b7c8f">纪律：不追高</text>

  <rect x="190" y="506" width="740" height="96" rx="12" fill="#f8fafc" stroke="#d9e4ef"/>
  <text x="214" y="538" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#1d3147">数据来源校验</text>
  <text x="214" y="568" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="16" fill="#4b5f73">ALLOWED facts: codes / pct / lianban / summary / news</text>
  <text x="214" y="592" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="16" fill="#4b5f73">card_validator: passed · channel: Telegram + Feishu fanout ready</text>
</svg>
